engineStrict: true
packages:
  - 'packages/*'
  - 'apps/*'
  - 'lib' # Keep legacy in workspace during migration
  - 'github-actions/*'

allowBuilds:
  '@vscode/vsce-sign': true
  esbuild: true
  keytar: true
  unrs-resolver: true

minimumReleaseAgeExclude:
  - esbuild@0.24.3
  - diff@8.0.3
  - serialize-javascript@7.0.3
  - serialize-javascript@7.0.5
  - uuid@11.1.1
  - form-data@4.0.6
  - tar@7.5.16
  - vite@8.0.16
  - js-yaml@4.1.2
  - markdown-it@14.1.2
  - hono@4.12.25
  - undici@7.28.0
  - undici@6.27.0
