name: Collection Scripts Library CI

on:
  push:
    branches: [main]
    paths:
      - "lib/**"
      - ".github/workflows/lib-collection-scripts-ci.yml"
      - "package.json"
      - "package-lock.json"
      - "eslint.shared.mjs"
  pull_request:
    branches: [main]
    paths:
      - "lib/**"
      - ".github/workflows/lib-collection-scripts-ci.yml"
      - "package.json"
      - "package-lock.json"
      - "eslint.shared.mjs"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  NODE_VERSION: "24"
  EXTENSION_DIR: "."

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: lib
          format: "sarif"
          output: "trivy-lib-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-lib-results.sarif"
          category: lib

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "${{ env.EXTENSION_DIR }}/package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        working-directory: lib
        run: npm run build

      - name: Run linting
        working-directory: lib
        run: npm run lint

      - name: Run tests
        working-directory: lib
        run: npm test

  publish:
    name: Publish to npmjs
    runs-on: ubuntu-latest
    environment: npmjs
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write  # Required for OIDC
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: "${{ env.EXTENSION_DIR }}/package-lock.json"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        working-directory: lib
        run: npm run build

      - name: Check if version changed
        id: version-check
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          PACKAGE_VERSION=$(node -p "require('./lib/package.json').version")

          if git tag -l "collection-scripts-v$PACKAGE_VERSION" | grep -q .; then
            echo "Tag collection-scripts-v$PACKAGE_VERSION already exists, auto-bumping patch version"
            (cd lib && npm version patch --no-git-tag-version)
            PACKAGE_VERSION=$(node -p "require('./lib/package.json').version")
            npm install --package-lock-only
            git add lib/package.json package-lock.json
            git add lib/package-lock.json 2>/dev/null || true
            git commit -m "chore: auto-bump collection-scripts to v$PACKAGE_VERSION [skip ci]"
            git push origin HEAD:main
          fi

          echo "version=$PACKAGE_VERSION" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create version tag
        run: |
          git tag "collection-scripts-v${{ steps.version-check.outputs.version }}"
          git push origin "collection-scripts-v${{ steps.version-check.outputs.version }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish package
        working-directory: lib
        run: npm publish --provenance --access public
