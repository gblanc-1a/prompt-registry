# Compute Ratings Workflow for Hub Repositories
#
# This GitHub Action aggregates star ratings from GitHub Discussion comments.
# It should be added to your engagement repository (the one referenced by
# `engagement.repository` in your hub config), NOT to the prompt-registry
# extension repository.
#
# Prerequisites:
# 1. Enable GitHub Discussions on your engagement repository
# 2. Create a discussion category named "Bundle Ratings" (or whatever you set
#    in `engagement.category` in your hub config)
# 3. Install @prompt-registry/collection-scripts (or use npx)
#
# Discussions are created lazily by the extension on the first vote per bundle.
# No admin pre-seeding or static mapping file is required.
#
# See: https://github.com/wherka-ama/prompt-registry/blob/main/docs/user-guide/engagement.md

name: Compute Ratings

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      repo:
        description: 'Engagement repository (owner/repo)'
        required: true
      category:
        description: 'Discussion category name'
        required: false
        default: 'Bundle Ratings'
      output_path:
        description: 'Path for ratings.json output'
        required: false
        default: 'ratings.json'

permissions:
  contents: write
  discussions: read

jobs:
  compute-ratings:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeScript
        run: npm run compile

      - name: Compute ratings
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npx --package @prompt-registry/collection-scripts compute-ratings \
            --repo "${{ github.event.inputs.repo || github.repository }}" \
            --category "${{ github.event.inputs.category || 'Bundle Ratings' }}" \
            --output "${{ github.event.inputs.output_path || 'ratings.json' }}"

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet ratings.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push ratings
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ratings.json
          git commit -m "chore: update ratings.json [skip ci]"
          git push
